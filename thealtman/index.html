<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Altman — owen doerr</title>
  <meta name="description" content="The Altman — an AI film by Owen Doerr." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <style>
:root{
  --text:#f5f2ea;
  --muted:rgba(245,242,234,.68);
  --dim:rgba(245,242,234,.38);
  --line:rgba(245,242,234,.16);
  --maxw:860px;
}
*{box-sizing:border-box}
html,body{height:100%; margin:0}
body{
  font-family:"Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:#050509;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit; text-decoration:none}
a:hover{text-decoration:underline}

#bg3d{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  overflow:hidden;
}

.page{
  position:relative;
  z-index:1;
  max-width:var(--maxw);
  margin:0 auto;
  padding:60px 24px 100px;
}

.back{
  display:inline-block;
  font-size:13px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:48px;
}
.back:hover{color:var(--text); text-decoration:none}

.kicker{
  font-size:12px;
  color:var(--dim);
  letter-spacing:.18em;
  text-transform:uppercase;
  margin:0 0 12px;
}

h1{
  margin:0 0 48px;
  font-size:56px;
  letter-spacing:-.03em;
  line-height:1.0;
}

.trailer-wrap{
  position:relative;
  width:100%;
  padding-bottom:56.25%; /* 16:9 */
  margin-bottom:48px;
  background:#000;
}
.trailer-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.notes{
  border-top:1px solid var(--line);
  padding-top:36px;
  font-size:17px;
  line-height:1.7;
  color:var(--muted);
  max-width:66ch;
}
.notes p{margin:0 0 1.4em}
.notes p:last-child{margin-bottom:0}

@media(max-width:520px){
  h1{font-size:38px}
  .page{padding:40px 20px 80px}
}
  </style>
</head>
<body>
  <div id="bg3d"></div>

  <div class="page">
    <a class="back" href="../">← owen doerr</a>

    <p class="kicker">AI Film &nbsp;·&nbsp; 2026</p>
    <h1>The Altman</h1>

    <div class="trailer-wrap">
      <iframe
        src="https://player.vimeo.com/video/1196517572?autoplay=1&color=f5f2ea&title=0&byline=0&portrait=0&badge=0&autopause=0&app_id=58479"
        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>

    <div class="notes">
      <p>PLACEHOLDER — replace this with your project description and production notes.</p>
    </div>
  </div>

<script>
  function isIOS(){
    return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  (function initStarfield(){
    if (!window.THREE) return;
    const bgContainer = document.getElementById('bg3d');
    if (!bgContainer) return;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050509, 0.02);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050509, 1);
    bgContainer.appendChild(renderer.domElement);

    const starField = new THREE.Group();
    scene.add(starField);

    function createStarLayer(count, radius, colorHex, size) {
      const geom = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = radius * (0.4 + Math.random() * 0.6);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
      }
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color: colorHex,
        size,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.9
      });
      return new THREE.Points(geom, mat);
    }

    const starsNear = createStarLayer(900, 10, 0xf5f2ea, 0.035);
    const starsMid  = createStarLayer(1200, 16, 0xa9b5d8, 0.028);
    const starsFar  = createStarLayer(1600, 24, 0x303b55, 0.022);

    starField.add(starsFar);
    starField.add(starsMid);
    starField.add(starsNear);

    const ambient = new THREE.AmbientLight(0x202030, 0.4);
    scene.add(ambient);

    const dimLight = new THREE.PointLight(0x2b3c5f, 0.25, 0, 2);
    dimLight.position.set(-6, 5, -4);
    scene.add(dimLight);

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function tick() {
      requestAnimationFrame(tick);
      starField.rotation.y += 0.0008;
      starField.rotation.x += 0.0004;

      const targetRotY = mouseX * 0.2;
      const targetRotX = -mouseY * 0.12;
      starField.rotation.y += (targetRotY - starField.rotation.y) * 0.04;
      starField.rotation.x += (targetRotX - starField.rotation.x) * 0.04;

      camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.03;
      camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.03;
      camera.lookAt(new THREE.Vector3(0, 0, 0));
      renderer.render(scene, camera);
    }

    tick();
  })();
</script>
</body>
</html>
