<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Altman — owen doerr</title>
  <meta name="description" content="The Altman — an AI film by Owen Doerr." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
:root{
  --text:#f5f2ea;
  --muted:rgba(245,242,234,.68);
  --dim:rgba(245,242,234,.38);
  --line:rgba(245,242,234,.16);
  --maxw:860px;
}
*{box-sizing:border-box}
html,body{height:100%; margin:0}
body{
  font-family:"Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:#050509;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit; text-decoration:none}
a:hover{text-decoration:underline}

.page{
  max-width:var(--maxw);
  margin:0 auto;
  padding:60px 24px 100px;
}

.back{
  display:inline-block;
  font-size:13px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--dim);
  margin-bottom:48px;
}
.back:hover{color:var(--text); text-decoration:none}

.kicker{
  font-size:12px;
  color:var(--dim);
  letter-spacing:.18em;
  text-transform:uppercase;
  margin:0 0 12px;
}

h1{
  margin:0 0 48px;
  font-size:56px;
  letter-spacing:-.03em;
  line-height:1.0;
}

.trailer-wrap{
  position:relative;
  width:100%;
  padding-bottom:56.25%; /* 16:9 */
  margin-bottom:48px;
  background:#000;
}
.trailer-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.notes{
  border-top:1px solid var(--line);
  padding-top:36px;
  font-size:17px;
  line-height:1.7;
  color:var(--muted);
  max-width:66ch;
}
.notes p{margin:0 0 1.4em}
.notes p:last-child{margin-bottom:0}

@media(max-width:520px){
  h1{font-size:38px}
  .page{padding:40px 20px 80px}
}
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">← owen doerr</a>

    <p class="kicker">AI Film &nbsp;·&nbsp; 2026</p>
    <h1>The Altman</h1>

    <div class="trailer-wrap">
      <iframe
        src="https://player.vimeo.com/video/1196517572?autoplay=1&color=f5f2ea&title=0&byline=0&portrait=0&badge=0&autopause=0&app_id=58479"
        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
      </iframe>
    </div>

    <div class="notes">
      <p>PLACEHOLDER — replace this with your project description and production notes.</p>
    </div>
  </div>
</body>
</html>
